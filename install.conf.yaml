- defaults:
    link:
      relink: true
      create: true

- clean: ['~']

- link:
    ~/.local/bin/ec: ec
    ~/.config/nvim/lua/plugins/vimtex.lua: vimtex.lua
  

- create:
  - ~/.local/bin
  - ~/.config/nvim/lua/plugins

- shell:
  - [git submodule update --init --recursive, Installing submodules]
